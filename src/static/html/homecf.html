<!DOCTYPE html>
<html lang="en">
<head>
    <title>Codeforces Checklist - OI Checklist</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style_homecf.css">
    <script src="/js/init_darkmode.js"></script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-content">
            <div class="navbar-left">
                <a href="/" class="home-icon">
                    <svg class="home-icon-svg" width="36" height="36" viewBox="0 0 24 24" stroke="none">
                        <path d="M12 3l9 7v11h-6v-8h-6v8H3V10l9-7z" />
                    </svg>
                </a>
                <div class="navbar-title" id="page-title">Codeforces Checklist</div>
            </div>
            <div class="navbar-user" id="navbar-user">
                <span class="welcome-message" id="welcome-message"></span>
                <a href="#" class="logout-button" id="logout-button">Logout</a>
                <div class="dark-mode-toggle">
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-switch">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </nav>

    <div class="homecf-container">
        <div class="homecf-header">
            <h1>Codeforces Problemset Checklist</h1>
            <p>A curated list of essential Codeforces problems for competitive programming.</p>
        </div>

        <div class="homecf-filters">
            <input type="text" id="cf-search" placeholder="Search by name, ID, or tags (e.g. 'dp', 'greedy')...">
            <select id="cf-difficulty">
                <option value="all">All Difficulties</option>
                <option value="800-1200">800 - 1200</option>
                <option value="1300-1600">1300 - 1600</option>
                <option value="1700-2000">1700 - 2000</option>
                <option value="2100+">2100+</option>
            </select>
        </div>

        <div class="homecf-add-section">
            <div class="add-row">
                <input type="text" id="add-cf-id" placeholder="ID (e.g. 123A)">
                <input type="text" id="add-cf-name" placeholder="Problem Name">
                <input type="number" id="add-cf-rating" placeholder="Rating">
                <input type="text" id="add-cf-tags" placeholder="Tags (comma separated)">
                <button id="add-cf-btn" class="add-button">Add Problem</button>
            </div>
        </div>

        <div class="homecf-list" id="cf-list">
            <div class="dropdown-loading">Loading Codeforces problems...</div>
        </div>
    </div>

    <!-- Status Popup -->
    <div id="status-popup" class="hidden" role="dialog" aria-modal="true">
        <div class="status-popup-content">
            <div class="status-buttons">
                <button class="status-btn status-0" data-status="0">Not Tried</button>
                <button class="status-btn status-1" data-status="1">Tried</button>
                <button class="status-btn status-2" data-status="2">Accepted</button>
            </div>
            <div class="status-popup-footer">
                <button id="note-button-popup" class="note-icon-btn" aria-label="Edit note" title="Edit note">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Note editor overlay -->
    <div id="note-overlay" class="popup-overlay" style="display:none;">
        <div class="popup" role="dialog" aria-modal="true" aria-labelledby="note-title">
            <div class="popup-header">
                <h2 id="note-title">Note</h2>
                <button class="popup-close" id="note-close" aria-label="Close">×</button>
            </div>
            <div class="popup-body">
                <div class="md-editor-container">
                    <div class="md-toolbar">
                        <button type="button" class="md-tool" onclick="applyInlineFormat('bold')" title="Bold"><strong>B</strong></button>
                        <button type="button" class="md-tool" onclick="applyInlineFormat('italic')" title="Italic"><em>I</em></button>
                        <button type="button" class="md-tool" onclick="applyInlineFormat('code')" title="Code"><code>&lt;/&gt;</code></button>
                        <button type="button" class="md-tool" onclick="applyInlineFormat('link')" title="Link">Link</button>
                        <div class="md-toolbar-spacer"></div>
                        <button type="button" class="md-tool md-toggle-btn" id="md-toggle" title="Toggle Preview">Preview</button>
                    </div>
                    <div class="md-editor-wrap">
                        <textarea id="md-textarea" class="md-textarea" placeholder="Write your notes here... (supports Markdown and LaTeX)"></textarea>
                        <div id="md-preview" class="md-preview" style="display: none;"></div>
                    </div>
                </div>
            </div>
            <input type="hidden" id="note-raw" value="">
            <div class="popup-footer">
                <button class="primary-button" id="note-save">Save</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/homecf.js"></script>
</body>
</html>
